server:
  port: 8082

spring:
  application:
    name: property-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/property_db}
    username: ${DB_USER:rental_user}
    password: ${DB_PASS:rental_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

upload:
  dir: ${UPLOAD_DIR:/app/uploads}

jwt:
  secret: cmVudGFsQXBwU2VjcmV0S2V5Rm9ySldUU2lnbmluZzIwMjVTZWN1cmVLZXk=
  expiration: 86400000

logging:
  level:
    com.rental.property: INFO
