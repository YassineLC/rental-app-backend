services:
  postgres:
    image: postgres:16
    container_name: rental-postgres
    environment:
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: rental_pass
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
